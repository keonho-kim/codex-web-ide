name: NPM Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install native build prerequisites
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION="$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            echo "Expected ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Test
        run: |
          sh -n install.sh
          bun test ui/src

      - name: Prepare npm package
        run: bun run pack:npm

      - name: Publish and set latest dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu

          PACKAGE_NAME="@keonhokim/codex-web"
          PACKAGE_VERSION="$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists. Updating latest dist-tag."
          else
            npm publish dist/npm/package --access public --tag latest
          fi

          npm access public "${PACKAGE_NAME}" || true
          npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" latest

          public_npmrc="$(mktemp)"
          public_visible=0
          for attempt in 1 2 3 4 5; do
            if NPM_CONFIG_USERCONFIG="${public_npmrc}" npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org/; then
              public_visible=1
              break
            fi
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not publicly visible yet. Retry ${attempt}/5."
            sleep 15
          done
          rm -f "${public_npmrc}"

          if [ "${public_visible}" != "1" ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} was published but is not publicly visible."
            exit 1
          fi
