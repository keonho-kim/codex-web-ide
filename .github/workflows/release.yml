name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build production archive (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install native build prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: |
          PACKAGE_VERSION="$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            echo "Expected ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Test
        run: |
          sh -n install.sh
          bun test ui/src

      - name: Build package tarball
        run: bun run pack:production
        env:
          CW_RELEASE_TARGET: ${{ matrix.target }}

      - name: Upload production archive
        uses: actions/upload-artifact@v4
        with:
          name: codex-web-ide-${{ matrix.target }}
          path: dist/codex-web-ide-*-${{ matrix.target }}.tgz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download production archives
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu

          if [ ! -f install.sh ]; then
            echo "Expected installer not found: install.sh"
            exit 1
          fi

          RELEASE_FILES="$(find dist/artifacts -type f -name 'codex-web-ide-*.tgz' | sort)"
          if [ -z "${RELEASE_FILES}" ]; then
            echo "Expected production release archives under dist/artifacts"
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" ${RELEASE_FILES} install.sh --clobber
          else
            gh release create "${GITHUB_REF_NAME}" ${RELEASE_FILES} install.sh --title "${GITHUB_REF_NAME}" --generate-notes
          fi
